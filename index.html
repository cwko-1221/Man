      <span id="questionLabel" data-zh="第 1 題" data-en="Question 1">第 1 題</span>
    </div>
    <div class="question-display">
      <div class="math-expression">
        <span id="numA">0.5</span>
        <span class="math-operator">×</span>
        <span id="numB">3</span>
        <span class="math-equals">=</span>
        <span class="math-qmark" id="qMark">?</span>
      </div>
    </div>
    <div class="input-area">
      <div class="answer-input-wrapper">
        <input
          type="text"
          inputmode="decimal"
          class="answer-input"
          id="answerInput"
          autocomplete="off"
          autofocus
        >
      </div>
      <div class="btn-row" id="btnSubmitRow">
        <button class="btn btn-hint" id="btnHint" onclick="showHint()">
          <i class="fas fa-lightbulb"></i>
          <span data-zh="提示" data-en="Hint">提示</span>
        </button>
        <button class="btn btn-submit" id="btnSubmit" onclick="checkAnswer()">
          <i class="fas fa-paper-plane"></i>
          <span data-zh="提交" data-en="Submit">提交</span>
        </button>
      </div>
      <div class="btn-row hidden" id="btnNextRow">
        <button class="btn btn-next" id="btnNext" onclick="nextQuestion()">
          <i class="fas fa-arrow-right"></i>
          <span data-zh="下一題" data-en="Next">下一題</span>
        </button>
      </div>
    </div>
    <div class="feedback-area" id="feedbackArea"></div>
    <div id="explanationArea"></div>
  </div>
</div>

<!-- Celebration Overlay -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celebration-card">
    <div class="celebration-emoji" id="celebEmoji">🎉</div>
    <h2 class="celebration-title" id="celebTitle" data-zh="太棒了！" data-en="Amazing!">太棒了！</h2>
    <div class="celebration-stats" id="celebStats"></div>
    <button class="btn-celebrate" id="celebBtn" onclick="startNewRound()">
      <span data-zh="再來一輪！" data-en="Play Again!">再來一輪！</span>
    </button>
  </div>
</div>

<script>
(function() {
  "use strict";

  // Dark mode detection
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(event) {
    if (event.matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  });

  // State
  var lang = 'zh';
  var currentLevel = 1;
  var questionIndex = 0;
  var totalQuestions = 10;
  var score = 0;
  var streak = 0;
  var bestStreak = 0;
  var totalAnswered = 0;
  var totalCorrect = 0;
  var currentA = 0;
  var currentB = 0;
  var currentAnswer = 0;
  var answered = false;
  var hintUsed = false;

  // Translations
  var translations = {
    questionLabel: { zh: '第 {n} 題', en: 'Question {n}' },
    correct: [
      { zh: '答對了！你真棒！', en: 'Correct! Awesome!' },
      { zh: '完全正確！繼續加油！', en: 'Perfect! Keep going!' },
      { zh: '太厲害了！', en: 'Amazing work!' },
      { zh: '非常好！你是數學天才！', en: 'Great! You\'re a math genius!' }
    ],
    wrong: { zh: '答錯了，正確答案是 {ans}。再接再厲！', en: 'Incorrect. The answer is {ans}. Keep trying!' },
    placeholder: { zh: '輸入你的答案...', en: 'Type your answer...' },
    celebTitle: [
      { zh: '太棒了！', en: 'Amazing!' },
      { zh: '太厲害了！', en: 'Incredible!' },
      { zh: '數學高手！', en: 'Math Master!' }
    ],
    celebStats: {
      zh: '你完成了 <strong>{total}</strong> 題<br>答對了 <strong>{correct}</strong> 題<br>準確率 <strong>{acc}%</strong><br>最高連續答對 <strong>{streak}</strong> 題',
      en: 'Completed <strong>{total}</strong> questions<br>Got <strong>{correct}</strong> correct<br>Accuracy <strong>{acc}%</strong><br>Best streak <strong>{streak}</strong>'
    }
  };

  // Elements
  var langToggle = document.getElementById('langToggle');
  var scoreEl = document.getElementById('scoreValue');
  var streakEl = document.getElementById('streakValue');
  var accuracyEl = document.getElementById('accuracyValue');
  var levelEl = document.getElementById('levelValue');
  var progressText = document.getElementById('progressText');
  var progressFill = document.getElementById('progressFill');
  var numAEl = document.getElementById('numA');
  var numBEl = document.getElementById('numB');
  var qMark = document.getElementById('qMark');
  var answerInput = document.getElementById('answerInput');
  var btnSubmitRow = document.getElementById('btnSubmitRow');
  var btnNextRow = document.getElementById('btnNextRow');
  var btnSubmit = document.getElementById('btnSubmit');
  var feedbackArea = document.getElementById('feedbackArea');
  var explanationArea = document.getElementById('explanationArea');
  var celebOverlay = document.getElementById('celebrationOverlay');
  var celebStats = document.getElementById('celebStats');

  // Language Toggle
  langToggle.addEventListener('click', function() {
    lang = lang === 'zh' ? 'en' : 'zh';
    langToggle.textContent = lang === 'zh' ? 'EN' : '中';
    updateLanguage();
  });

  function updateLanguage() {
    var els = document.querySelectorAll('[data-zh]');
    els.forEach(function(el) {
      el.textContent = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
    });
    answerInput.placeholder = translations.placeholder[lang];
    updateQuestionLabel();
  }

  function updateQuestionLabel() {
    var label = document.getElementById('questionLabel');
    var tmpl = translations.questionLabel[lang];
    label.textContent = tmpl.replace('{n}', questionIndex + 1);
    label.setAttribute('data-zh', translations.questionLabel.zh.replace('{n}', questionIndex + 1));
    label.setAttribute('data-en', translations.questionLabel.en.replace('{n}', questionIndex + 1));
  }

  // Level Selection
  window.setLevel = function(level) {
    currentLevel = level;
    var btns = document.querySelectorAll('.level-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    document.querySelector('.level-btn[data-level="' + level + '"]').classList.add('active');
    levelEl.textContent = level;
    resetRound();
  };

  // Number generation helpers
  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function roundNum(n, decimals) {
    var factor = Math.pow(10, decimals);
    return Math.round(n * factor) / factor;
  }

  function generateQuestion() {
    var a, b;
    switch (currentLevel) {
      case 1: // Whole × 1-decimal
        a = randInt(2, 9);
        b = roundNum(randInt(1, 99) / 10, 1);
        break;
      case 2: // 1-decimal × 1-decimal
        a = roundNum(randInt(1, 99) / 10, 1);
        b = roundNum(randInt(1, 99) / 10, 1);
        break;
      case 3: // 2-decimal × whole
        a = roundNum(randInt(1, 999) / 100, 2);
        b = randInt(2, 9);
        break;
      case 4: // 2-decimal × 1-decimal
        a = roundNum(randInt(1, 999) / 100, 2);
        b = roundNum(randInt(1, 99) / 10, 1);
        break;
      case 5: { // Mixed
        var subtype = randInt(1, 4);
        if (subtype === 1) { a = randInt(2, 15); b = roundNum(randInt(1, 99) / 10, 1); }
        else if (subtype === 2) { a = roundNum(randInt(1, 99) / 10, 1); b = roundNum(randInt(1, 99) / 10, 1); }
        else if (subtype === 3) { a = roundNum(randInt(1, 999) / 100, 2); b = randInt(2, 12); }
        else { a = roundNum(randInt(1, 999) / 100, 2); b = roundNum(randInt(1, 99) / 10, 1); }
        break;
      }
      default:
        a = randInt(2, 9);
        b = roundNum(randInt(1, 99) / 10, 1);
    }

    // Ensure at least one is a decimal
    if (Number.isInteger(a) && Number.isInteger(b)) {
      b = roundNum(randInt(1, 99) / 10, 1);
    }

    currentA = a;
    currentB = b;
    currentAnswer = roundNum(a * b, 4);
  }

  function displayQuestion() {
    numAEl.textContent = currentA;
    numBEl.textContent = currentB;
    qMark.classList.remove('hidden');
    answerInput.value = '';
    answerInput.className = 'answer-input';
    answerInput.disabled = false;
    answerInput.placeholder = translations.placeholder[lang];
    btnSubmitRow.classList.remove('hidden');
    btnNextRow.classList.add('hidden');
    btnSubmit.disabled = false;
    feedbackArea.innerHTML = '';
    explanationArea.innerHTML = '';
    answered = false;
    hintUsed = false;
    updateQuestionLabel();
    updateProgress();
    answerInput.focus();
  }

  function updateProgress() {
    progressText.textContent = questionIndex + ' / ' + totalQuestions;
    progressFill.style.width = (questionIndex / totalQuestions * 100) + '%';
  }

  function updateStats() {
    scoreEl.textContent = score;
    streakEl.textContent = streak;
    var acc = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
    accuracyEl.textContent = totalAnswered > 0 ? acc + '%' : '-%';
  }

  // Check Answer
  window.checkAnswer = function() {
    if (answered) return;
    var val = answerInput.value.trim();
    if (val === '') return;

    var userAnswer = parseFloat(val);
    if (isNaN(userAnswer)) return;

    answered = true;
    totalAnswered++;
    answerInput.disabled = true;
    btnSubmit.disabled = true;

    var isCorrect = Math.abs(userAnswer - currentAnswer) < 0.0001;

    if (isCorrect) {
      totalCorrect++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      var points = hintUsed ? 5 : 10;
      points += streak >= 3 ? 5 : 0;
      score += points;
      answerInput.classList.add('correct');
      qMark.classList.add('hidden');

      var msgs = translations.correct;
      var msg = msgs[randInt(0, msgs.length - 1)];
      var bonusText = '';
      if (streak >= 3) {
        bonusText = lang === 'zh'
          ? ' 🔥 連續 ' + streak + ' 題答對！+'  + points + ' 分'
          : ' 🔥 ' + streak + ' streak! +' + points + ' pts';
      } else {
        bonusText = (lang === 'zh' ? ' +' + points + ' 分' : ' +' + points + ' pts');
      }

      feedbackArea.innerHTML = '<div class="feedback-msg feedback-correct"><i class="fas fa-check-circle"></i><span>' + msg[lang] + bonusText + '</span></div>';
    } else {
      streak = 0;
      answerInput.classList.add('wrong');

      var wrongMsg = translations.wrong[lang].replace('{ans}', currentAnswer);
      feedbackArea.innerHTML = '<div class="feedback-msg feedback-wrong"><i class="fas fa-times-circle"></i><span>' + wrongMsg + '</span></div>';
      showExplanation();
    }

    updateStats();
    btnSubmitRow.classList.add('hidden');
    btnNextRow.classList.remove('hidden');

    // Check if round is complete
    if (questionIndex + 1 >= totalQuestions) {
      setTimeout(function() {
        var nextBtnSpan = document.querySelector('#btnNext span');
        nextBtnSpan.textContent = lang === 'zh' ? '查看結果' : 'See Results';
      }, 100);
    }
  };

  // Hint
  window.showHint = function() {
    if (answered || hintUsed) return;
    hintUsed = true;

    var aStr = String(currentA);
    var bStr = String(currentB);
    var aDecimals = aStr.includes('.') ? aStr.split('.')[1].length : 0;
    var bDecimals = bStr.includes('.') ? bStr.split('.')[1].length : 0;
    var totalDecimals = aDecimals + bDecimals;

    var aInt = Math.round(currentA * Math.pow(10, aDecimals));
    var bInt = Math.round(currentB * Math.pow(10, bDecimals));

    var hint;
    if (lang === 'zh') {
      hint = '💡 <strong>提示：</strong><br>';
      hint += '① 先把小數變成整數：<span class="step-math">' + currentA + ' → ' + aInt + '</span>，<span class="step-math">' + currentB + ' → ' + bInt + '</span><br>';
      hint += '② 計算整數相乘：<span class="step-math">' + aInt + ' × ' + bInt + ' = ' + (aInt * bInt) + '</span><br>';
      hint += '③ 共有 <span class="step-math">' + totalDecimals + '</span> 位小數，從右數 ' + totalDecimals + ' 位點小數點';
    } else {
      hint = '💡 <strong>Hint:</strong><br>';
      hint += '① Convert to whole numbers: <span class="step-math">' + currentA + ' → ' + aInt + '</span>, <span class="step-math">' + currentB + ' → ' + bInt + '</span><br>';
      hint += '② Multiply: <span class="step-math">' + aInt + ' × ' + bInt + ' = ' + (aInt * bInt) + '</span><br>';
      hint += '③ Total decimal places: <span class="step-math">' + totalDecimals + '</span>, count ' + totalDecimals + ' from right';
    }

    feedbackArea.innerHTML = '<div class="feedback-msg feedback-hint"><i class="fas fa-lightbulb"></i><span>' + hint + '</span></div>';
  };

  // Explanation
  function showExplanation() {
    var aStr = String(currentA);
    var bStr = String(currentB);
    var aDecimals = aStr.includes('.') ? aStr.split('.')[1].length : 0;
    var bDecimals = bStr.includes('.') ? bStr.split('.')[1].length : 0;
    var totalDecimals = aDecimals + bDecimals;
    var aInt = Math.round(currentA * Math.pow(10, aDecimals));
    var bInt = Math.round(currentB * Math.pow(10, bDecimals));
    var product = aInt * bInt;

    var html = '<div class="explanation-card">';
    html += '<div class="explanation-title"><i class="fas fa-book-open"></i> ';
    html += lang === 'zh' ? '解題步驟' : 'Step-by-Step Solution';
    html += '</div>';
    html += '<ol class="step-list">';

    if (lang === 'zh') {
      html += '<li><span class="step-num">1</span><span class="step-text">把 <span class="step-math">' + currentA + '</span> 變成整數 <span class="step-math">' + aInt + '</span>（向右移 ' + aDecimals + ' 位）</span></li>';
      html += '<li><span class="step-num">2</span><span class="step-text">把 <span class="step-math">' + currentB + '</span> 變成整數 <span class="step-math">' + bInt + '</span>（向右移 ' + bDecimals + ' 位）</span></li>';
      html += '<li><span class="step-num">3</span><span class="step-text">整數相乘：<span class="step-math">' + aInt + ' × ' + bInt + ' = ' + product + '</span></span></li>';
      html += '<li><span class="step-num">4</span><span class="step-text">兩個數共移了 <span class="step-math">' + aDecimals + ' + ' + bDecimals + ' = ' + totalDecimals + '</span> 位小數</span></li>';
      html += '<li><span class="step-num">5</span><span class="step-text">在 <span class="step-math">' + product + '</span> 中從右邊數 ' + totalDecimals + ' 位點上小數點 → <span class="step-math">' + currentAnswer + '</span></span></li>';
    } else {
      html += '<li><span class="step-num">1</span><span class="step-text">Convert <span class="step-math">' + currentA + '</span> to <span class="step-math">' + aInt + '</span> (move ' + aDecimals + ' place' + (aDecimals > 1 ? 's' : '') + ' right)</span></li>';
      html += '<li><span class="step-num">2</span><span class="step-text">Convert <span class="step-math">' + currentB + '</span> to <span class="step-math">' + bInt + '</span> (move ' + bDecimals + ' place' + (bDecimals > 1 ? 's' : '') + ' right)</span></li>';
      html += '<li><span class="step-num">3</span><span class="step-text">Multiply whole numbers: <span class="step-math">' + aInt + ' × ' + bInt + ' = ' + product + '</span></span></li>';
      html += '<li><span class="step-num">4</span><span class="step-text">Total decimal places: <span class="step-math">' + aDecimals + ' + ' + bDecimals + ' = ' + totalDecimals + '</span></span></li>';
      html += '<li><span class="step-num">5</span><span class="step-text">Place decimal point ' + totalDecimals + ' place' + (totalDecimals > 1 ? 's' : '') + ' from right in <span class="step-math">' + product + '</span> → <span class="step-math">' + currentAnswer + '</span></span></li>';
    }

    html += '</ol></div>';
    explanationArea.innerHTML = html;
  }

  // Next Question
  window.nextQuestion = function() {
    questionIndex++;
    if (questionIndex >= totalQuestions) {
      showCelebration();
      return;
    }
    generateQuestion();
    displayQuestion();
  };

  // Celebration
  function showCelebration() {
    var acc = totalAnswered > 0 ? Math.round(totalCorrect / totalAnswered * 100) : 0;
    var titles = translations.celebTitle;
    var titleObj = titles[randInt(0, titles.length - 1)];
    var celebTitleEl = document.getElementById('celebTitle');
    celebTitleEl.textContent = titleObj[lang];
    celebTitleEl.setAttribute('data-zh', titleObj.zh);
    celebTitleEl.setAttribute('data-en', titleObj.en);

    var emojiEl = document.getElementById('celebEmoji');
    if (acc >= 90) emojiEl.textContent = '🏆';
    else if (acc >= 70) emojiEl.textContent = '🎉';
    else if (acc >= 50) emojiEl.textContent = '💪';
    else emojiEl.textContent = '📚';

    var statsHtml = translations.celebStats[lang]
      .replace('{total}', totalQuestions)
      .replace('{correct}', totalCorrect)
      .replace('{acc}', acc)
      .replace('{streak}', bestStreak);
    celebStats.innerHTML = statsHtml;

    celebOverlay.classList.add('show');
    spawnConfetti();
  }

  window.startNewRound = function() {
    celebOverlay.classList.remove('show');
    resetRound();
  };

  function resetRound() {
    questionIndex = 0;
    var roundCorrectBefore = totalCorrect;
    // Keep cumulative stats but reset round
    bestStreak = Math.max(bestStreak, streak);
    generateQuestion();
    displayQuestion();
    updateStats();
  }

  // Confetti
  function spawnConfetti() {
    var colors = ['#FF8C42', '#FF6B6B', '#2EC4B6', '#7B68EE', '#FFD166', '#06D6A0'];
    for (var i = 0; i < 50; i++) {
      (function(index) {
        setTimeout(function() {
          var piece = document.createElement('div');
          piece.className = 'confetti-piece';
          piece.style.left = Math.random() * 100 + 'vw';
          piece.style.top = '-10px';
          piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          piece.style.width = (Math.random() * 8 + 5) + 'px';
          piece.style.height = (Math.random() * 8 + 5) + 'px';
          piece.style.opacity = String(Math.random() * 0.8 + 0.2);
          document.body.appendChild(piece);

          var x = (Math.random() - 0.5) * 200;
          var duration = Math.random() * 2000 + 1500;
          piece.animate([
            { transform: 'translateY(0) translateX(0) rotate(0deg)', opacity: 1 },
            { transform: 'translateY(' + (window.innerHeight + 20) + 'px) translateX(' + x + 'px) rotate(' + (Math.random() * 720) + 'deg)', opacity: 0 }
          ], { duration: duration, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }).onfinish = function() {
            piece.remove();
          };
        }, index * 30);
      })(i);
    }
  }

  // Enter key
  answerInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (!answered) {
        window.checkAnswer();
      } else {
        window.nextQuestion();
      }
    }
  });

  // Init
  answerInput.placeholder = translations.placeholder[lang];
  generateQuestion();
  displayQuestion();
  updateStats();
})();
</script>
</body>
</html>
